<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PashuAdhaar – Identify Breed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="classifier-body">
  <script>
    if (localStorage.getItem("loggedIn") !== "true") {
      window.location.href = "login.html";
    }
  </script>

  <div class="classifier-shell">
    <header class="classifier-header">
      <div class="classifier-brand">
        <span class="logo-icon">🐄</span>
        <div>
          <h1 data-i18n="app.title">PashuAdhaar</h1>
          <p data-i18n="classifier.subtitle">Upload photo • See animal breed</p>
        </div>
      </div>
      <div class="classifier-header-right">
        <div id="lang-toggle" class="lang-toggle">
          <button type="button" data-lang="en" class="lang-pill active">English</button>
          <button type="button" data-lang="hi" class="lang-pill">हिन्दी</button>
        </div>
        <button class="btn-ghost small" onclick="window.location.href='dashboard.html'">
          <i class="fa-solid fa-grid-2"></i>
          <span data-i18n="classifier.back">Back to Dashboard</span>
        </button>
      </div>
    </header>

    <main class="classifier-main card">
      <section class="classifier-section">
        <h2 data-i18n="classifier.title">Identify Animal Breed</h2>
        <p class="section-subtitle" data-i18n="classifier.text">Upload one clear photo of the animal.</p>

        <div id="upload-area" class="upload-area">
          <img id="image-preview" class="image-preview" src="#" alt="Image Preview" />
          <div id="upload-prompt" class="upload-prompt">
            <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
            </svg>
            <p data-i18n="classifier.drag"><strong>Drag & Drop</strong> photo here</p>
            <p class="small-text" data-i18n="classifier.or">or</p>
            <button type="button" class="upload-button" onclick="document.getElementById('file-input').click()">
              <span data-i18n="classifier.browse">Upload Animal Image</span>
            </button>
          </div>
          <input type="file" id="file-input" accept="image/*" hidden />
        </div>

        <div id="result-area" class="result-area hidden">
          <div class="spinner" id="classifier-spinner"></div>
          <div id="result-text" class="result-text"></div>
        </div>

        <button id="reset-button" class="reset-button hidden" data-i18n="classifier.again">Upload Another Image</button>
      </section>
    </main>

    <footer class="classifier-footer">
      <p data-i18n="classifier.footer">Powered by AI • PashuAdhaar Identity System</p>
    </footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js" defer></script>
  <script src="js/language.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
