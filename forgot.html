<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PashuAdhaar – Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="auth-body">
  <div class="auth-wrapper single-column">
    <div class="auth-panel">
      <div class="auth-panel-inner">
        <div class="auth-header">
          <h2>Reset password</h2>
          <p>Enter your registered mobile number and new password.</p>
        </div>

        <form id="reset-form" class="auth-form">
          <div class="form-group">
            <label for="reset-mobile">Registered Mobile</label>
            <div class="input-with-icon">
              <i class="fa-solid fa-mobile-screen-button"></i>
              <input
                type="tel"
                id="reset-mobile"
                name="mobile"
                placeholder="10-digit mobile number"
                pattern="[0-9]{10}"
                maxlength="10"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="reset-password">New Password</label>
            <div class="input-with-icon password-field">
              <i class="fa-solid fa-lock"></i>
              <input
                type="password"
                id="reset-password"
                name="newpassword"
                placeholder="Enter new password"
                minlength="6"
                required
              />
              <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-primary btn-block">
            <span>Update password</span>
            <i class="fa-solid fa-key"></i>
          </button>

          <p class="auth-switch">
            Remembered your password?
            <a href="login.html">Back to login</a>
          </p>
        </form>
      </div>
      <div class="auth-footer">
        <span>© <span id="auth-year"></span> PashuAdhaar. All rights reserved.</span>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
